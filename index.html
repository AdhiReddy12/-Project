<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Home</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .btn-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 20px;
        }

        .btn-group a {
            padding: 10px 25px;
            border-radius: 4px;
            text-decoration: none;
            color: white;
            font-size: 16px;
        }

        .btn-group .btn-login {
            background: #4CAF50;
        }

        .btn-group .btn-login:hover {
            background: #45a049;
        }

        .btn-group .btn-signup {
            background: #2196F3;
        }

        .btn-group .btn-signup:hover {
            background: #1976D2;
        }

        h2 {
            margin-bottom: 5px;
        }

        p {
            color: #666;
            margin-top: 0;
        }
    </style>
</head>

<body>
    <div class="form-box" style="text-align: center;">
        <h2>Welcome!</h2>
        <p>Please login or create an account.</p>
        <div class="btn-group">
            <a href="login.html" class="btn-login">Login</a>
            <a href="signup.html" class="btn-signup">Sign Up</a>
        </div>
    </div>
</body>

</html>
