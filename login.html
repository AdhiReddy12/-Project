<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .input-group {
            position: relative;
            margin: 8px 0;
        }

        .input-group input {
            margin: 0;
            width: 100%;
            padding-right: 40px;
        }

        .toggle-btn {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            font-size: 16px;
            color: #888;
            width: auto;
            margin: 0;
            padding: 0;
        }
    </style>
</head>

<body>
    <div class="form-box">
        <h2>Login</h2>
        <div id="msg" style="color: green; text-align: center; margin-bottom: 10px;"></div>
        <form id="loginForm">
            <input type="email" placeholder="Email" required>
            <div class="input-group">
                <input type="password" id="password" placeholder="Password" required>
                <button type="button" class="toggle-btn" onclick="togglePassword('password', this)">👁️</button>
            </div>
            <button type="submit" class="btn-login">Login</button>
        </form>
        <p>Don't have an account? <a href="signup.html">Sign Up</a></p>
    </div>

    <script>
        function togglePassword(id, btn) {
            const input = document.getElementById(id);
            if (input.type === "password") {
                input.type = "text";
                btn.textContent = "🙈";
            } else {
                input.type = "password";
                btn.textContent = "👁️";
            }
        }

        document.getElementById("loginForm").addEventListener("submit", function (e) {
            e.preventDefault();
            document.getElementById("msg").textContent = "Login Successful!";
        });
    </script>
</body>

</html>
