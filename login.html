<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Glass morph background layer */
        body {
            background: #0d0d1a;
            overflow: hidden;
        }

        #bg-root {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }

        /* Keep existing content above the background */
        .form-box {
            position: relative;
            z-index: 10;
        }

        .input-group {
            position: relative;
            margin: 8px 0;
        }

        .input-group input {
            margin: 0;
            width: 100%;
            padding-right: 40px;
        }

        .toggle-btn {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            font-size: 16px;
            color: #888;
            width: auto;
            margin: 0;
            padding: 0;
        }
    </style>
</head>

<body>
    <div class="form-box">
        <h2>Login</h2>
        <div id="msg" style="color: green; text-align: center; margin-bottom: 10px;"></div>
        <form id="loginForm">
            <input type="email" placeholder="Email" required>
            <div class="input-group">
                <input type="password" id="password" placeholder="Password" required>
                <button type="button" class="toggle-btn" onclick="togglePassword('password', this)">👁️</button>
            </div>
            <button type="submit" class="btn-login">Login</button>
        </form>
        <p>Don't have an account? <a href="signup.html">Sign Up</a></p>
    </div>

    <script>
        function togglePassword(id, btn) {
            const input = document.getElementById(id);
            if (input.type === "password") {
                input.type = "text";
                btn.textContent = "😮‍💨";
            } else {
                input.type = "password";
                btn.textContent = "🫣";
            }
        }

        document.getElementById("loginForm").addEventListener("submit", function (e) {
            e.preventDefault();
            document.getElementById("msg").textContent = "Login Successful!";
        });
    </script>

    <!-- Glass Morph Background (React) -->
    <div id="bg-root"></div>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script type="text/babel" src="morph-bg.js"></script>
</body>

</html>
