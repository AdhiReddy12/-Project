<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Sign Up</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .requirements {
            font-size: 13px;
            color: #555;
            margin: 8px 0 12px 0;
            padding-left: 16px;
        }

        .requirements li {
            margin: 3px 0;
        }

        .input-group {
            position: relative;
            margin: 8px 0;
        }

        .input-group input {
            margin: 0;
            width: 100%;
            padding-right: 40px;
        }

        .toggle-btn {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            font-size: 16px;
            color: #888;
            width: auto;
            margin: 0;
            padding: 0;
        }
    </style>
</head>

<body>
    <div class="form-box">
        <h2>Sign Up</h2>
        <div id="msg" style="text-align: center; margin-bottom: 10px;"></div>
        <form id="signupForm">
            <input type="text" placeholder="Full Name" required>
            <input type="email" placeholder="Email" required>
            <div class="input-group">
                <input type="password" id="password" placeholder="Password" required>
                <button type="button" class="toggle-btn" onclick="togglePassword('password', this)">👁️</button>
            </div>
            <ul class="requirements">
                <li>At least 8 characters</li>
                <li>At least one capital letter (A-Z)</li>
                <li>At least one number (0-9)</li>
                <li>At least one special character (!@#$%^&*...)</li>
            </ul>
            <div class="input-group">
                <input type="password" id="confirmPassword" placeholder="Confirm Password" required>
                <button type="button" class="toggle-btn" onclick="togglePassword('confirmPassword', this)">👁️</button>
            </div>
            <button type="submit" class="btn-signup">Sign Up</button>
        </form>
        <p>Already have an account? <a href="login.html">Login</a></p>
    </div>

    <script>
        function togglePassword(id, btn) {
            const input = document.getElementById(id);
            if (input.type === "password") {
                input.type = "text";
                btn.textContent = "😮‍💨";
            } else {
                input.type = "password";
                btn.textContent = "🫣";
            }
        }
    </script>
    <script src="script.js"></script>
</body>

</html>
